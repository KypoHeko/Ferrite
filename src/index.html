<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferrite</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>

<body>
  <div class="shell">

    <!-- TITLE BAR -->
    <div class="titlebar" data-tauri-drag-region>
      <div class="titlebar__brand" data-tauri-drag-region>
        <svg class="titlebar__logo" viewBox="0 0 14 14">
          <circle cx="7" cy="7" r="6" />
          <circle class="titlebar__logo-center" cx="7" cy="7" r="3" />
          <line x1="7" y1="1" x2="7" y2="4" stroke-width="1" />
          <line x1="7" y1="10" x2="7" y2="13" stroke-width="1" />
          <line x1="1" y1="7" x2="4" y2="7" stroke-width="1" />
          <line x1="10" y1="7" x2="13" y2="7" stroke-width="1" />
        </svg>
        <span class="titlebar__text">Ferrite</span>
      </div>
      <div class="titlebar__buttons">
        <button id="skin-toggle" class="titlebar__btn" title="Skins">
          <svg width="8" height="8" viewBox="0 0 8 8">
            <path d="M4 0.5 C5.6 3 6.6 4.1 6.6 5.3 A2.6 2.6 0 0 1 1.4 5.3 C1.4 4.1 2.4 3 4 0.5 Z" />
          </svg>
        </button>
        <button id="viz-toggle" class="titlebar__btn on" title="Visualizer">
          <svg viewBox="0 0 14 14" width="12" height="12">
            <rect x="1" y="6" width="2" height="6" />
            <rect x="4" y="3" width="2" height="9" />
            <rect x="7" y="5" width="2" height="7" />
            <rect x="10" y="2" width="2" height="10" />
          </svg>
        </button>
        <button id="eq-toggle" class="titlebar__btn" title="Equalizer">
          <svg width="8" height="8" viewBox="0 0 8 8">
            <rect x="1" y="3" width="2" height="4" />
            <rect x="3.5" y="1" width="2" height="6" />
            <rect x="6" y="2" width="2" height="5" />
          </svg>
        </button>
        <button id="pl-toggle" class="titlebar__btn on" title="Playlist">
          <svg width="8" height="8" viewBox="0 0 8 8">
            <rect x="0.5" y="1" width="7" height="1" />
            <rect x="0.5" y="3.5" width="7" height="1" />
            <rect x="0.5" y="6" width="7" height="1" />
          </svg>
        </button>
        <button id="win-min" class="titlebar__btn" title="Minimize">
          <svg width="8" height="8" viewBox="0 0 8 8">
            <rect x="1" y="6" width="6" height="1.2" />
          </svg>
        </button>
        <button id="win-close" class="titlebar__btn titlebar__btn--close" title="Close">
          <svg width="8" height="8" viewBox="0 0 8 8">
            <path d="M1 1 L7 7 M7 1 L1 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- SKIN MENU -->
    <div id="skin-menu" class="skin-menu hidden">
      <div class="skin-menu__head">Skins</div>
      <div id="skin-list"></div>
      <div class="skin-menu__foot">
        <button id="skin-refresh" type="button">Refresh</button>
        <button id="skin-open-dir" type="button">Folder</button>
      </div>
    </div>

    <!-- LCD -->
    <div class="lcd">
      <div class="lcd__top">
        <div class="lcd__metric"><span class="lcd__metric-label">kbps</span><span class="lcd__metric-value"
            id="kbps">—</span></div>
        <div class="lcd__time" id="cur">00:00</div>
        <div class="lcd__metric"><span class="lcd__metric-label">kHz</span><span class="lcd__metric-value"
            id="khz">—</span></div>
      </div>
      <div class="lcd__marquee"><span id="track">No file selected</span></div>
      <div class="lcd__leds">
        <span class="lcd__led" id="stereo">STEREO</span>
        <span class="lcd__led" id="fmt">—</span>
      </div>
    </div>

    <!-- VISUALIZER -->
    <div class="viz"><canvas id="spectrum"></canvas></div>

    <!-- PROGRESS -->
    <div class="progress">
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1" disabled />
    </div>

    <!-- TRACK INFO -->
    <div class="track-info">
      <span id="now-num">—</span>
      <span id="now-title">—</span>
      <span id="tot">--:--</span>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="transport">
        <button id="shuffle" class="ctrl-btn" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H20" />
            <path d="m18 2 4 4-4 4" />
            <path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2" />
            <path d="M20 18h-3.9c-1.3 0-2.5-.6-3.3-1.7l-.5-.8" />
            <path d="m18 14 4 4-4 4" />
          </svg>
        </button>
        <button id="prev" class="ctrl-btn" title="Previous" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="5" width="3" height="14" />
            <polygon points="21,5 10,12 21,19" />
          </svg>
        </button>
        <button id="playpause" class="play-btn" title="Play" disabled>
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="6,4 20,12 6,20" />
          </svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="5" width="4" height="14" rx="1" />
            <rect x="14" y="5" width="4" height="14" rx="1" />
          </svg>
        </button>
        <button id="stop" class="ctrl-btn" title="Stop" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="5" y="5" width="14" height="14" rx="2" />
          </svg>
        </button>
        <button id="next" class="ctrl-btn" title="Next" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="18" y="5" width="3" height="14" />
            <polygon points="3,5 14,12 3,19" />
          </svg>
        </button>
        <button id="repeat" class="ctrl-btn" title="Repeat: off">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M17 2l4 4-4 4" />
            <path d="M3 11v-1a4 4 0 0 1 4-4h14" />
            <path d="M7 22l-4-4 4-4" />
            <path d="M21 13v1a4 4 0 0 1-4 4H3" />
          </svg>
        </button>
      </div>
      <div class="volume">
        <span class="volume__icon"><svg viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
          </svg></span>
        <input type="range" id="vol" min="0" max="100" value="100" />
        <span id="vol-val">100</span>
      </div>
    </div>

    <!-- EQUALIZER -->
    <div id="eq" class="eq is-collapsed">
      <div class="eq__header">
        <span class="eq__title">Equalizer</span>
        <div class="eq__actions">
          <label class="eq__enable"><input type="checkbox" id="eq-enable" checked /> on</label>
          <button id="eq-reset">Reset</button>
        </div>
      </div>
      <div class="eq-presets" id="eq-presets"></div>
      <div class="eq-bands" id="eq-bands"></div>
    </div>

    <!-- PLAYLIST -->
    <div class="playlist">
      <div class="playlist__header">
        <span class="playlist__title">Playlist</span>
        <span id="track-count">0 tracks</span>
      </div>
      <ul id="playlist">
        <li class="empty"><button type="button" class="pl-add">Empty — drop tracks here</button></li>
      </ul>
    </div>

  </div>
  <script type="module" src="js/main.js"></script>
</body>

</html>
